<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Portal Mualaf</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-box {
            background: var(--apple-bg-alt);
            padding: 60px;
            border-radius: var(--radius-apple);
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">PortalMualaf</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Utama</a>
                <a href="fardhu-ain.html" class="nav-link">Fardhu Ain</a>
                <a href="zakat.html" class="nav-link">Zakat</a>
            </div>
        </div>
    </nav>

    <header class="stage">
        <h1 class="stage-title">Sertai Kami.</h1>
        <p class="stage-subtitle">Daftar untuk mendapatkan bimbingan peribadi.</p>
    </header>

    <main class="container">
        <div class="form-box">
            <form action="#">
                <div class="input-group">
                    <label class="input-label">NAMA PENUH</label>
                    <input type="text" class="input-field" placeholder="Nama anda">
                </div>
                <div class="input-group">
                    <label class="input-label">EMEL</label>
                    <input type="email" class="input-field" placeholder="emel@contoh.com">
                </div>
                <div class="input-group">
                    <label class="input-label">KATA LALUAN</label>
                    <input type="password" class="input-field" placeholder="Min 8 aksara">
                </div>
                <button class="btn-apple" style="width: 100%; padding: 15px; font-size: 17px; margin-top: 20px;">Daftar
                    Sekarang</button>
            </form>
        </div>
    </main>

    <footer class="section" style="text-align: center; margin-top: 100px;">
        <p style="color: var(--apple-text-muted); font-size: 12px;">© 2026 Portal Mualaf. Hak Cipta Terpelihara.</p>
    </footer>
</body>

</html>
