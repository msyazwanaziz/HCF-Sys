<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCF Admin - Data Entry</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Include Phosphor Icons for aesthetic icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <img src="https://hidayahcentre.org.my/wp-content/uploads/2021/06/logo-web2.png" onerror="this.src='https://hidayahcentre.org.my/wp-content/uploads/2021/06/logo-web2-100x64.png'" alt="HCF Logo">
            </div>
            <span style="font-size: 1.2rem; display: none;">HCF Sys</span>
        </div>
        
        <ul class="nav-links">
            <li><a href="index.html"><i class="ph ph-squares-four"></i> Dashboard</a></li>
            <li><a href="admin.html" class="active" id="nav-data-entry"><i class="ph ph-file-plus"></i> Data Entry</a></li>
            <li style="margin-top: auto;">
                <a href="#" id="auth-button"><i class="ph ph-sign-out"></i> Logout</a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <div>
                <span style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Hidayah Centre Foundation</span>
            </div>
            <div class="user-profile">
                <div class="google-sheets-sync" style="margin: 0;">
                    <i class="ph ph-arrows-clockwise" id="sync-icon"></i>
                    <span id="sync-status">Connected</span>
                </div>
                <div class="avatar" id="user-avatar">
                    A
                </div>
                <span id="user-role" style="font-size: 0.9rem; font-weight: 600; color: var(--text-primary);">Admin</span>
            </div>
        </header>

        <!-- Admin Content -->
        <div class="dashboard-container" id="admin-view">
            <!-- Data Entry Form -->
            <div id="data-entry-content" class="animate-fade-in">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Manual Data Entry</h1>
                        <p style="color: var(--text-secondary); margin-top: 5px;">Record new inflow transactions directly into the system. Data will sync automatically.</p>
                    </div>
                </div>

                <div class="admin-form" style="background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 2.5rem; box-shadow: var(--shadow-lg); backdrop-filter: blur(16px);">
                    <form id="inflow-form">
                        <div class="form-group">
                            <label style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.75rem;">Bank / Component</label>
                            <div style="position: relative;">
                                <select id="bank" class="form-control" required style="appearance: none; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); padding: 0.85rem 1.25rem;">
                                    <option value="" disabled selected>Select Bank Account</option>
                                    <option value="maybank">Maybank (Primary)</option>
                                    <option value="cimb">CIMB (Secondary)</option>
                                    <option value="bimb">BIMB (Zakat/Special)</option>
                                </select>
                                <i class="ph ph-caret-down" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted);"></i>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                            <div class="form-group">
                                <label style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.75rem;">Amount (RM)</label>
                                <input type="number" id="amount" class="form-control" step="0.01" min="0" placeholder="0.00" required style="background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); padding: 0.85rem 1.25rem;">
                            </div>
                            <div class="form-group">
                                <label style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.75rem;">Transaction Date</label>
                                <input type="date" id="date" class="form-control" required style="background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); padding: 0.85rem 1.25rem; color-scheme: dark;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.75rem;">Reference ID / Receipt No.</label>
                            <input type="text" id="reference" class="form-control" placeholder="e.g. TR-99824" required style="background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); padding: 0.85rem 1.25rem;">
                        </div>

                        <div class="form-group">
                            <label style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.75rem;">Notes / Donor info (Optional)</label>
                            <input type="text" id="notes" class="form-control" placeholder="Hamba Allah" style="background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); padding: 0.85rem 1.25rem;">
                        </div>

                        <div class="google-sheets-sync" style="justify-content: center; margin: 1.5rem 0 2rem 0; background: rgba(56, 189, 248, 0.05); color: var(--accent-primary); border-color: rgba(56, 189, 248, 0.1);">
                            <i class="ph ph-google-logo"></i> Records will be automatically synced to Google Sheets
                        </div>

                        <div style="text-align: right;">
                            <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; padding: 1rem;">
                                <i class="ph-bold ph-plus-circle"></i> Submit Record
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
